<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mitra</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <main class="paginaLogin">
        <section class="cardLogin" aria-label="Área de login">
            <img src="../assets/mitra_semfundo.png" alt="Logo Mitra" class="logoLogin">
            <h1>Bem-vindo ao Mitra</h1>
            <p class="subtituloLogin">Entre com suas credenciais</p>

            <form id="formLogin" class="formLogin" action="#">
                <label for="email">
                    E-mail
                    <input type="email" id="email" name="email" autocomplete="username" required>
                </label>

                <label for="senha">
                    Senha
                    <input type="password" id="senha" name="senha" autocomplete="current-password" required>
                </label>

                <button type="submit" id="entrar">Entrar</button>
            </form>
        </section>
    </main>

    <script src="../js/usuario_login.js"></script>
</body>
</html>
