<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo Treinador</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../equipe/equipe.css" />
    <link rel="stylesheet" href="treinador_novo.css" />
  </head>
  <body>
    <div class="conteudo">
      <div class="menu"></div>
      <div class="conteudoEquipe">
        <div class="headerConteudo"><h1>Novo Treinador</h1></div>
        <form id="formTreinadorNovo" class="modalEquipeForm">
          <div class="blocoFormulario">
            <div class="camposGrid">
              <label>Nome <input type="text" name="nome"></label>
              <label>Data de nascimento <input type="date" name="data_nascimento"></label>
              <label>Telefone <input type="text" name="telefone"></label>
              <label>CREF <input type="text" name="cref"></label>
              <label>Data de início <input type="date" name="data_inicio"></label>
              <label>E-mail <input type="email" name="email"></label>
              <label>Senha <input type="password" name="senha"></label>
              <label>Status
                <select name="status">
                  <option value="ativo" selected>Ativo</option>
                  <option value="inativo">Inativo</option>
                </select>
              </label>
            </div>
          </div>
          <div class="modalEquipeAcoes">
            <a href="treinador.html">Voltar</a>
            <button type="submit">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <script src="../js/menu_lateral.js"
      data-menuHtml="../componentes/menuLateral.html"
      data-menuCss="../componentes/menuLateral.css"
      data-menuTarget=".menu"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/treinador/treinador_novo.js"></script>
  </body>
</html>
