<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo Treinador</title>
    <link rel="stylesheet" href="../componentes/menuLateral.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../equipe/equipe.css" />
    <link rel="stylesheet" href="treinador_novo.css" />
  </head>
  <body>
    <div class="conteudo">
      <div id="menu-lateral"></div>
      <div class="conteudoEquipe">
        <div class="headerConteudo"><h1>Novo Treinador</h1></div>
        <form id="formTreinadorNovo" class="modalEquipeForm" novalidate>
          <div class="blocoFormulario">
            <div class="camposGrid">
              <label>Nome <input type="text" name="nome" placeholder="Nome completo" required></label>
              <label>Data de nascimento <input type="date" name="data_nascimento" required></label>
              <label>Telefone <input type="text" name="telefone" placeholder="(41) 99999-9999" inputmode="numeric" required></label>
              <label>CREF <input type="text" name="cref" placeholder="123456-G/PR" required></label>
              <label>Data de início <input type="date" name="data_inicio"></label>
              <label>Status
                <select name="status" required>
                  <option value="ativo" selected>Ativo</option>
                  <option value="inativo">Inativo</option>
                </select>
              </label>
            </div>
          </div>
          <div class="blocoFormulario credenciaisUsuario">
            <h2 class="tituloBlocoFormulario">Cadastro de Usuario</h2>
            <div class="camposGrid">
              <label>E-mail <input type="email" name="email" placeholder="nome@email.com" required></label>
              <label>Senha <input type="text" name="senha" placeholder="Senha de acesso" required></label>
            </div>
          </div>
          <div class="modalEquipeAcoes">
            <a href="treinador.html"><i class="bi bi-arrow-left"></i> Voltar</a>
            <button type="submit"><i class="bi bi-check-circle"></i> Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <script src="../js/menu_lateral.js" defer></script>
    <script src="../js/notificacao.js"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/treinador/treinador_novo.js"></script>
  </body>
</html>
