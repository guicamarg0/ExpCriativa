<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alterar Equipe</title>
    <link rel="stylesheet" href="equipe.css" />
  </head>
  <body>
    <div class="conteudo">
      <div class="menu"></div>
      <div class="conteudoEquipe">
        <div class="headerConteudo"><h1>Alterar Equipe</h1></div>
        <form id="formEquipeEdicao" class="modalEquipeForm">
          <input type="hidden" name="id" />
          <div class="blocoEquipeForm">
            <div class="camposGridEquipe">
              <label>Nome <input type="text" name="nome" /></label>
              <label>Categoria <input type="text" name="categoria" /></label>
              <label>Modalidade
                <select name="id_modalidade" id="id_modalidade">
                  <option value="">Selecione uma modalidade</option>
                </select>
              </label>
              <label>Genero
                <select name="id_genero" id="id_genero">
                  <option value="">Selecione um genero</option>
                </select>
              </label>
              <label>Treinador responsavel
                <select name="id_treinador_responsavel" id="id_treinador_responsavel">
                  <option value="">Selecione um treinador</option>
                </select>
              </label>
              <label>IDs dos atletas <input type="text" name="atletas_ids" /></label>
              <label>Status
                <select name="status">
                  <option value="ativa">Ativa</option>
                  <option value="inativa">Inativa</option>
                </select>
              </label>
            </div>
            <label>Descricao <textarea name="descricao" rows="3"></textarea></label>
          </div>
          <div class="modalEquipeAcoes">
            <a href="equipe.html"><i class="bi bi-arrow-left"></i> Voltar</a>
            <button type="submit"><i class="bi bi-check-circle"></i> Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <script src="../js/menu_lateral.js"
      data-menuHtml="../componentes/menuLateral.html"
      data-menuCss="../componentes/menuLateral.css"
      data-menuTarget=".menu"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/equipe/equipe_alterar.js"></script>
  </body>
</html>
