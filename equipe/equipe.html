<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout HTML</title>
    <link rel="stylesheet" href="equipe.css">
</head>
<body>

    <div class="conteudo">
        <div class="menu"></div>
        <div class="conteudoEquipe">
            <div class="headerConteudo">
                <h1>Equipes</h1>
                <button id="btnAbrirModalEquipe" type="button">+ Adicionar Equipe</button>
            </div>
            <div class="listViewEquipes"></div>
        </div>
    </div>

    <div class="modalEquipe" id="modalEquipe" aria-hidden="true">
        <div class="modalEquipeOverlay" data-modal-close></div>
        <div class="modalEquipeCard" role="dialog" aria-modal="true" aria-labelledby="modalEquipeTitulo">
            <div class="modalEquipeHeader">
                <h2 id="modalEquipeTitulo">Cadastrar equipe</h2>
                <button class="modalEquipeFechar" type="button" aria-label="Fechar" data-modal-close>x</button>
            </div>
            <form class="modalEquipeForm" action="#">
                <label>
                    Nome
                    <input type="text" name="nome" maxlength="100" required>
                </label>
                <label>
                    Descricao
                    <textarea name="descricao" rows="3"></textarea>
                </label>
                <label>
                    Modalidade (id)
                    <input type="number" name="id_modalidade" min="1">
                </label>
                <label>
                    Genero (id)
                    <input type="number" name="id_genero" min="1">
                </label>
                <label>
                    Categoria
                    <input type="text" name="categoria" maxlength="50">
                </label>
                <label>
                    Status
                    <select name="status">
                        <option value="ativa" selected>Ativa</option>
                        <option value="inativa">Inativa</option>
                    </select>
                </label>
                <div class="modalEquipeAcoes">
                    <button class="btnSecundario" type="button">Vincular atletas</button>
                    <button class="btnSecundario" type="button">Vincular treinadores</button>
                    <button class="btnPrimario" type="submit">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modalEquipe modalEquipeEdicao" id="modalEquipeEdicao" aria-hidden="true">
        <div class="modalEquipeOverlay" data-modal-close-edit></div>
        <div class="modalEquipeCard" role="dialog" aria-modal="true" aria-labelledby="modalEquipeEdicaoTitulo">
            <div class="modalEquipeHeader">
                <h2 id="modalEquipeEdicaoTitulo">Editar equipe</h2>
                <button class="modalEquipeFechar" type="button" aria-label="Fechar" data-modal-close-edit>x</button>
            </div>
            <form class="modalEquipeForm modalEquipeFormEditar" action="#">
                <input type="hidden" name="id">
                <label>
                    Nome
                    <input type="text" name="nome" maxlength="100" required>
                </label>
                <label>
                    Descricao
                    <textarea name="descricao" rows="3"></textarea>
                </label>
                <label>
                    Modalidade (id)
                    <input type="number" name="id_modalidade" min="1">
                </label>
                <label>
                    Genero (id)
                    <input type="number" name="id_genero" min="1">
                </label>
                <label>
                    Categoria
                    <input type="text" name="categoria" maxlength="50">
                </label>
                <label>
                    Status
                    <select name="status">
                        <option value="ativa">Ativa</option>
                        <option value="inativa">Inativa</option>
                    </select>
                </label>
                <div class="modalEquipeAcoes">
                    <button class="btnSecundario" type="button">Vincular atletas</button>
                    <button class="btnSecundario" type="button">Vincular treinadores</button>
                    <button class="btnExcluir" type="button">Excluir</button>
                    <button class="btnPrimario" type="submit">Salvar alteracoes</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modalEquipe modalConfirmacao" id="modalConfirmacao" aria-hidden="true">
        <div class="modalEquipeOverlay" data-confirm-close></div>
        <div class="modalEquipeCard" role="dialog" aria-modal="true" aria-labelledby="modalConfirmacaoTitulo">
            <div class="modalEquipeHeader">
                <h2 id="modalConfirmacaoTitulo">Confirmar ação</h2>
                <button class="modalEquipeFechar" type="button" aria-label="Fechar" data-confirm-close>x</button>
            </div>
            <p class="modalConfirmacaoTexto" id="modalConfirmacaoTexto">Tem certeza que deseja continuar?</p>
            <div class="modalEquipeAcoes">
                <button class="btnSecundario" type="button" data-confirm-cancelar>Cancelar</button>
                <button class="btnExcluir" type="button" data-confirm-ok>Confirmar</button>
            </div>
        </div>
    </div>

    <script src="../js/menu_lateral.js"
    data-menuHtml="../componentes/menuLateral.html"
    data-menuCss="../componentes/menuLateral.css"
    data-menuTarget=".menu"></script>
      <script src="../js/equipe/equipe.js"></script>

</body>
</html>
