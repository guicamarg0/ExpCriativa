<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Atleta</title>
    <link rel="stylesheet" href="atleta.css">
</head>
<body>
    <div class="conteudo">
        <div class="menu"></div>
        <div class="conteudoAtleta">
            <div class="headerConteudo">
                <h1>Novo Atleta</h1>
            </div>
            <form id="formAtletaNovo" class="modalAtletaForm">
                <div class="blocoFormulario">
                    <h2 class="tituloBlocoFormulario">Dados do Atleta</h2>
                    <div class="camposGrid">
                        <label>Nome <input type="text" name="nome"></label>
                        <label>Data de nascimento <input type="date" name="data_nascimento"></label>
                        <label>GÃªnero
                            <select name="id_genero" id="id_genero">
                                <option value="">Selecione um gÃªnero</option>
                            </select>
                        </label>
                        <label>Altura <input type="text" name="altura"></label>
                        <label>Peso <input type="text" name="peso"></label>
                        <label>Status
                            <select name="status">
                                <option value="ativo" selected>Ativo</option>
                                <option value="inativo">Inativo</option>
                            </select>
                        </label>
                    </div>
                </div>
            </form>

            <form id="formUsuarioAtletaNovo" class="modalAtletaForm">
                <div class="blocoFormulario credenciaisUsuario">
                    <h2 class="tituloBlocoFormulario">Cadastro de Usuario</h2>
                    <div class="camposGrid">
                        <label>E-mail <input type="text" name="email"></label>
                        <label>Senha <input type="password" name="senha"></label>
                    </div>
                </div>
                <div class="modalAtletaAcoes">
                    <a href="atleta.html"><i class="bi bi-arrow-left"></i> Voltar</a>
                    <button type="submit"><i class="bi bi-check-circle"></i> Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/menu_lateral.js"
    data-menuHtml="../componentes/menuLateral.html"
    data-menuCss="../componentes/menuLateral.css"
    data-menuTarget=".menu"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/select_loader.js"></script>
    <script src="../js/atleta/atleta_novo.js"></script>
</body>
</html>
