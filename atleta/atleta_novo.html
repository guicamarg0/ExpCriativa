<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo Atleta</title>
    <link rel="stylesheet" href="../componentes/menuLateral.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="atleta.css">
</head>
<body>
    <div class="conteudo">
        <div id="menu-lateral"></div>
        <div class="conteudoAtleta">
            <div class="headerConteudo">
                <h1>Novo Atleta</h1>
            </div>

            <form id="formAtletaNovo" class="modalAtletaForm" novalidate>
                <div class="blocoFormulario">
                    <h2 class="tituloBlocoFormulario">Dados do Atleta</h2>
                    <div class="camposGrid">
                        <label>Nome <input type="text" name="nome" placeholder="Nome completo" required></label>
                        <label>Data de nascimento <input type="date" name="data_nascimento" required></label>
                        <label>Genero
                            <select name="id_genero" id="id_genero" required>
                                <option value="">Selecione um genero</option>
                            </select>
                        </label>
                        <label>Altura <input type="text" name="altura" placeholder="Ex: 1,75" inputmode="decimal" required></label>
                        <label>Peso <input type="text" name="peso" placeholder="Ex: 70,50" inputmode="decimal" required></label>
                        <label>Status
                            <select name="status" required>
                                <option value="ativo" selected>Ativo</option>
                                <option value="inativo">Inativo</option>
                            </select>
                        </label>
                    </div>
                </div>

                <div class="blocoFormulario credenciaisUsuario">
                    <h2 class="tituloBlocoFormulario">Cadastro de Usuario</h2>
                    <div class="camposGrid">
                        <label>E-mail <input type="email" name="email" placeholder="nome@email.com" required></label>
                        <label>Senha <input type="text" name="senha" placeholder="Senha de acesso" required></label>
                    </div>
                </div>

                <div class="modalAtletaAcoes">
                    <a href="atleta.html"><i class="bi bi-arrow-left"></i> Voltar</a>
                    <button type="submit"><i class="bi bi-check-circle"></i> Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/menu_lateral.js" defer></script>
    <script src="../js/notificacao.js"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/atleta/atleta_novo.js"></script>
</body>
</html>
