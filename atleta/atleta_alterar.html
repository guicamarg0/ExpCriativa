<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="menu-tela-atual" content="ATLETA">
    <title>Alterar Atleta</title>
    <link rel="stylesheet" href="atleta.css">
</head>
<body>
    <div class="conteudo">
        <div class="menu"></div>
        <div class="conteudoAtleta">
            <div class="headerConteudo">
                <h1>Alterar Atleta</h1>
            </div>
            <form id="formAtletaEdicao" class="modalAtletaForm">
                <input type="hidden" name="id">
                <div class="blocoFormulario">
                    <div class="camposGrid">
                        <label>Nome <input type="text" name="nome"></label>
                        <label>Data de nascimento <input type="date" name="data_nascimento"></label>
                        <label>Gênero
                            <select name="id_genero" id="id_genero">
                                <option value="">Selecione um gênero</option>
                            </select>
                        </label>
                        <label>Altura <input type="text" name="altura"></label>
                        <label>Peso <input type="text" name="peso"></label>
                        <label>Status
                            <select name="status">
                                <option value="ativo">Ativo</option>
                                <option value="inativo">Inativo</option>
                            </select>
                        </label>
                    </div>
                </div>
                <div class="modalAtletaAcoes">
                    <a href="atleta.html"><i class="bi bi-arrow-left"></i> Voltar</a>
                    <button type="submit"><i class="bi bi-check-circle"></i> Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/menu_lateral.js"
    data-menuHtml="../componentes/menuLateral.html"
    data-menuTarget=".menu"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/atleta/atleta_alterar.js"></script>
</body>
</html>
