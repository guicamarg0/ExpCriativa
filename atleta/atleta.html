<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atletas</title>
    <link rel="stylesheet" href="atleta.css">
</head>
<body>
    <div class="conteudo">
        <div class="menu"></div>
        <div class="conteudoAtleta">
            <div class="headerConteudo">
                <h1>Atletas</h1>
                <div class="acoesHeaderAtleta">
                    <a href="atleta_novo.html">+ Adicionar Atleta</a>
                </div>
            </div>
            <!-- Painel de gráficos estáticos (serão preenchidos pelo JS) -->
            <div class="painelAtleta">
                <section class="atletaTopo">
                    <div class="atletaPerfil">
                        <span class="atletaIcon">👤</span>
                        <div>
                            <strong id="atletaNome">—</strong>
                            <span id="atletaEquipe">Sem equipe · —</span>
                        </div>
                    </div>
                </section>

                <div class="graficosResumo">
                    <article class="cardGrafico cardGraficoBarras" id="grafPresencas">
                        <div class="graficoHeader"><h3>Presenças (últimos 6 meses)</h3></div>
                        <div class="barrasChart">Carregando...</div>
                    </article>

                    <article class="cardGrafico cardGraficoLinha" id="grafEvolucao">
                        <div class="graficoHeader"><h3>Evolução do treino</h3></div>
                        <div class="linhaWrapper">Carregando...</div>
                    </article>

                    <article class="cardGrafico" id="cardProximoTreino">
                        <div class="graficoHeader"><h3>Próximo treino</h3></div>
                        <div class="proximoConteudo">Carregando...</div>
                    </article>
                </div>
            </div>
            <div class="cabecalhoAtletas" aria-hidden="true">
                <span></span>
                <span>Nome</span>
                <span>Data de nascimento</span>
                <span>Gênero</span>
                <span>Altura</span>
                <span>Peso</span>
                <span>Status</span>
            </div>
            <div class="listViewAtletas"></div>
        </div>
    </div>

    <script src="../js/menu_lateral.js"
    data-menuHtml="../componentes/menuLateral.html"
    data-menuCss="../componentes/menuLateral.css"
    data-menuTarget=".menu"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/atleta/atletaSessao.js"></script>
    <script src="../js/atleta/atleta_index.js"></script>
</body>
</html>
