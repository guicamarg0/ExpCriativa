<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="menu-tela-atual" content="ESPORTES">
    <title>Modalidades</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --azul-mitra: #181952;
            --cinza-borda: #e5e5e5;
        }

        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* css menu lateral*/
        .sidebar {
            min-height: 100vh;
            border-right: 1px solid var(--cinza-borda);
            background-color: #ffffff;
        }

        .logo-container {
            text-align: center;
            padding: 40px 20px;
        }

        .logo-container img {
            max-width: 140px; 
        }

        .menu-lateral {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            border-bottom: 1px solid var(--azul-mitra);
        }

        .menu-item:first-child {
            border-top: 1px solid var(--azul-mitra);
        }

        .menu-link {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            color: var(--azul-mitra);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }

        .menu-link:hover {
            background-color: #f8f9fa;
            color: var(--azul-mitra);
        }

        .menu-link i {
            font-size: 1.3rem;
            margin-right: 15px;
        }

        /* --- css - esportes --- */
        .conteudo-principal {
            padding: 40px 50px;
        }

        h1 {
            color: var(--azul-mitra);
            font-weight: 600;
            font-size: 2rem;
            margin: 0; 
        }

        hr {
            border-color: var(--azul-mitra);
            opacity: 0.2;
        }

        
        #novo {
            background-color: var(--azul-mitra);
            color: white;
            border: 1px solid var(--azul-mitra);
        }
        #novo:hover {
            background-color: #22246b;
            color: white;
        }

        #logoff {
            background-color: transparent;
            color: var(--azul-mitra);
            border: 1px solid var(--azul-mitra);
        }
        #logoff:hover {
            background-color: #f8f9fa;
        }

        /* css tabela dinamica do js */
        #lista table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        #lista th {
            background-color: var(--azul-mitra);
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-weight: 500;
        }

        #lista td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--cinza-borda);
            vertical-align: middle;
        }

        #lista tr:hover {
            background-color: #f8f9fa;
        }

        #lista a {
            color: var(--azul-mitra);
            text-decoration: none;
            font-weight: 500;
            margin-right: 15px;
        }

        #lista a:hover {
            text-decoration: underline;
        }

        #lista th:last-child, 
        #lista td:last-child {
            text-align: center;
        }

        #lista td:last-child a:last-child {
            margin-right: 0; 
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- menu lateral -->
            <div class="col-12 col-md-3 col-lg-2 p-0 sidebar">
                <div class="logo-container">
                    <img src="../assets/mitra.png" alt="Logo mitra" class="img-fluid">
                </div>
                
                <ul class="menu-lateral">
                    <li class="menu-item">
                        <a href="esportes.html" class="menu-link">
                            <i class="bi bi-dribbble"></i> Esportes
                        </a>
                    </li>

                    <li class="menu-item">
                        <a href="../treino/atletas_treino.html" class="menu-link">
                            <i class="bi bi-people"></i> Treinador - Planilhas de treino
                        </a>
                    </li>

                    <li class="menu-item">
                        <a href="#" class="menu-link">
                            <i class="bi bi-people"></i> Equipes
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="#" class="menu-link">
                            <i class="bi bi-clipboard-check"></i> Treinadores
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="#" class="menu-link">
                            <i class="bi bi-person-walking"></i> Atletas
                        </a>
                    </li>
                </ul>
            </div>
            <!-- fim menu lateral -->

            <!-- esportes - conteúdo principal -->
            <div class="col-12 col-md-9 col-lg-10 conteudo-principal">
                
                <div class="d-flex justify-content-between align-items-center">
                    <h1>Modalidades - Esportes</h1>
                    <button id="logoff" class="btn px-4">Sair</button>
                </div>
                
                <hr>
                
                <div class="mb-4">
                    <button id="novo" class="btn px-4">Nova modalidade</button>
                </div>
                
                <div id="lista"></div>
            </div>

        </div>
    </div>

    <script src="../js/esportes/esportes_index.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
