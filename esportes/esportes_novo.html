<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova modalidade</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../componentes/menuLateral.css">

    <style>
        :root {
            --azul-mitra: #181952;
            --cinza-borda: #e5e5e5;
        }

        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .conteudo {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .conteudo-principal {
            flex: 1;
            min-width: 0;
            padding: 40px 50px;
        }

        h1 {
            color: var(--azul-mitra);
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 0;
        }

        hr {
            border-color: var(--azul-mitra);
            opacity: 0.2;
        }

        #enviar {
            background-color: var(--azul-mitra);
            color: white;
            border: 1px solid var(--azul-mitra);
        }

        #enviar:hover {
            background-color: #22246b;
            color: white;
        }

        .form-container {
            max-width: 500px;
        }
    </style>
</head>
<body>
    <div class="conteudo">
        <div id="menu-lateral"></div>

        <div class="conteudo-principal">
            <div>
                <h1>Nova modalidade</h1>
            </div>
            <hr class="mb-4">

            <form id="formEsporteNovo" class="form-container">
                <div class="mb-3">
                    <label for="nome" class="form-label fw-semibold text-secondary">Nome da modalidade</label>
                    <input type="text" id="nome" name="nome" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label for="status" class="form-label fw-semibold text-secondary">Status</label>
                    <select id="status" name="status" class="form-select">
                        <option value="ativo">Ativo</option>
                        <option value="inativo">Inativo</option>
                    </select>
                </div>

                <div>
                    <button type="submit" id="enviar" class="btn px-4">Enviar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/menu_lateral.js" defer></script>
    <script src="../js/esportes/esportes_novo.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
