<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova modalidade</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../componentes/menuLateral.css">
    <link rel="stylesheet" href="esportes_novo.css">
</head>
<body>
    <div class="conteudo">
        <div id="menu-lateral"></div>

        <div class="conteudo-principal">
            <div>
                <h1>Nova modalidade</h1>
            </div>
            <hr class="mb-4">

            <form id="formEsporteNovo" class="form-container" novalidate>
                <div class="mb-3">
                    <label for="nome" class="form-label fw-semibold text-secondary">Nome da modalidade</label>
                    <input type="text" id="nome" name="nome" class="form-control" placeholder="Ex: Futebol" required>
                </div>

            <div class="mb-4">
              <label for="status" class="form-label fw-semibold text-secondary"
                >Status</label
              >
              <select id="status" name="status" class="form-select" required>
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
              </select>
            </div>

            <div class="mb-4">
              <label
                for="exercicios"
                class="form-label fw-semibold text-secondary"
                >Exercícios da modalidade</label
              >
              <textarea
                id="exercicios"
                name="exercicios"
                class="form-control"
                rows="5"
                required
                placeholder="Digite um exercício por linha"
              ></textarea>
            </div>
                        <div>
                          <button type="submit" id="enviar" class="btn px-4" class="btn px-4">Enviar</button>
                </div>
            </form>
        </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/menu_lateral.js" defer></script>
    <script src="../js/notificacao.js"></script>
    <script src="../js/esportes/esportes_novo.js"></script>
    <script src="../js/valida_sessao.js"></script>
  </body>
</html>
