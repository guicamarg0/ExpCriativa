<!-- formulario de novo esporte -->
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova modalidade</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --azul-mitra: #181952;
        --cinza-borda: #e5e5e5;
      }

      body {
        background-color: #ffffff;
        color: #333;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      /* --- css menu lateral */
      .sidebar {
        min-height: 100vh;
        border-right: 1px solid var(--cinza-borda);
        background-color: #ffffff;
      }

      .logo-container {
        text-align: center;
        padding: 40px 20px;
      }

      .logo-container img {
        max-width: 140px;
      }

      .menu-lateral {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .menu-item {
        border-bottom: 1px solid var(--azul-mitra);
      }

      .menu-item:first-child {
        border-top: 1px solid var(--azul-mitra);
      }

      .menu-link {
        display: flex;
        align-items: center;
        padding: 16px 24px;
        color: var(--azul-mitra);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
        transition: background-color 0.2s;
      }

      .menu-link:hover {
        background-color: #f8f9fa;
        color: var(--azul-mitra);
      }

      .menu-link i {
        font-size: 1.3rem;
        margin-right: 15px;
      }

      /* --- css - novo esporte --- */
      .conteudo-principal {
        padding: 40px 50px;
      }

      h1 {
        color: var(--azul-mitra);
        font-weight: 600;
        font-size: 2rem;
        margin-bottom: 0;
      }

      hr {
        border-color: var(--azul-mitra);
        opacity: 0.2;
      }

      #enviar {
        background-color: var(--azul-mitra);
        color: white;
        border: 1px solid var(--azul-mitra);
      }
      #enviar:hover {
        background-color: #22246b;
        color: white;
      }

      .form-container {
        max-width: 500px;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <!--menu lateral-->
        <div class="col-12 col-md-3 col-lg-2 p-0 sidebar">
          <div class="logo-container">
            <img src="../assets/mitra.png" alt="Logo mitra" class="img-fluid" />
          </div>

          <ul class="menu-lateral">
            <li class="menu-item">
              <a href="esportes.html" class="menu-link">
                <i class="bi bi-dribbble"></i> Esportes
              </a>
            </li>
            <li class="menu-item">
              <a href="#" class="menu-link">
                <i class="bi bi-people"></i> Equipes
              </a>
            </li>
            <li class="menu-item">
              <a href="#" class="menu-link">
                <i class="bi bi-clipboard-check"></i> Treinadores
              </a>
            </li>
            <li class="menu-item">
              <a href="#" class="menu-link">
                <i class="bi bi-person-walking"></i> Atletas
              </a>
            </li>
          </ul>
        </div>

        <!--novo esporte - conteudo principal-->
        <div class="col-12 col-md-9 col-lg-10 conteudo-principal">
          <div>
            <h1>Nova modalidade</h1>
          </div>
          <hr class="mb-4" />

          <div class="form-container">
            <div class="mb-3">
              <label for="nome" class="form-label fw-semibold text-secondary"
                >Nome da modalidade</label
              >
              <input type="text" id="nome" class="form-control" />
            </div>

            <div class="mb-4">
              <label for="status" class="form-label fw-semibold text-secondary"
                >Status</label
              >
              <select id="status" name="status" class="form-select">
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
              </select>
            </div>

            <div class="mb-4">
              <label
                for="exercicios"
                class="form-label fw-semibold text-secondary"
                >Exercícios da modalidade</label
              >
              <textarea
                id="exercicios"
                class="form-control"
                rows="5"
                placeholder="Digite um exercício por linha"
              ></textarea>
            </div>

            <div>
              <button id="enviar" class="btn px-4">Enviar</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/esportes/esportes_novo.js"></script>
    <script src="../js/valida_sessao.js"></script>
  </body>
</html>
