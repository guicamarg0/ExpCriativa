<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilha de Treinos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --azul-mitra: #181952;
            --cinza-borda: #e5e5e5;
        }

        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* css menu lateral*/
        .sidebar {
            min-height: 100vh;
            border-right: 1px solid var(--cinza-borda);
            background-color: #ffffff;
        }

        .logo-container {
            text-align: center;
            padding: 40px 20px;
        }

        .logo-container img {
            max-width: 140px; 
        }

        .menu-lateral {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            border-bottom: 1px solid var(--azul-mitra);
        }

        .menu-item:first-child {
            border-top: 1px solid var(--azul-mitra);
        }

        .menu-link {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            color: var(--azul-mitra);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }

        .menu-link:hover {
            background-color: #f8f9fa;
            color: var(--azul-mitra);
        }

        .menu-link i {
            font-size: 1.3rem;
            margin-right: 15px;
        }

        /* --- css - esportes --- */
        .conteudo-principal {
            padding: 40px 50px;
        }

        h1 {
            color: var(--azul-mitra);
            font-weight: 600;
            font-size: 2rem;
            margin: 0; 
        }

        hr {
            border-color: var(--azul-mitra);
            opacity: 0.2;
        }

        
        #novo {
            background-color: var(--azul-mitra);
            color: white;
            border: 1px solid var(--azul-mitra);
        }
        #novo:hover {
            background-color: #22246b;
            color: white;
        }

        #logoff {
            background-color: transparent;
            color: var(--azul-mitra);
            border: 1px solid var(--azul-mitra);
        }
        #logoff:hover {
            background-color: #f8f9fa;
        }

        .btn-planilha {
            background-color: #3d5af1;
            color: white;
            border: none;
            padding: 7px 18px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-planilha:hover {
            background-color: #2a3fb5;
            box-shadow: 0 3px 10px rgba(61, 90, 241, 0.3);
        }

        .card-treino {
            background: #fff;
            border: 1px solid var(--cinza-borda);
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card-treino h3 {
            color: var(--azul-mitra);
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-treino p {
            margin: 4px 0;
            font-size: 0.9rem;
            color: #555;
        }

        .card-treino a {
    display: inline-flex;
    align-items: center;
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    text-decoration: none;
    margin-right: 6px;
    margin-top: 10px;
    transition: all 0.15s;
    }

    .card-treino a:first-of-type {
        background-color: #eef1ff;
        color: #3d5af1;
    }

    .card-treino a:first-of-type:hover {
        background-color: #3d5af1;
        color: #fff;
    }

    .card-treino a:last-of-type {
        background-color: #fff0f0;
        color: #c0392b;
    }

    .card-treino a:last-of-type:hover {
        background-color: #c0392b;
        color: #fff;
    }

    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
<!-- menu lateral -->
            <div class="col-12 col-md-3 col-lg-2 p-0 sidebar">
                <div class="logo-container">
                    <img src="../assets/mitra.png" alt="Logo mitra" class="img-fluid">
                </div>
                
                <ul class="menu-lateral">
                    <li class="menu-item">
                        <a href="../esportes/esportes.html" class="menu-link">
                            <i class="bi bi-dribbble"></i> Esportes
                        </a>
                    </li>

                    <li class="menu-item">
                        <a href="../treino/atletas_treino.html" class="menu-link">
                            <i class="bi-clipboard2-pulse"></i> Treinador - Planilhas de Treino
                        </a>
                    </li>


                    <li class="menu-item">
                        <a href="#" class="menu-link">
                            <i class="bi bi-people"></i> Equipes
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="#" class="menu-link">
                            <i class="bi bi-clipboard-check"></i> Treinadores
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="#" class="menu-link">
                            <i class="bi bi-person-walking"></i> Atletas
                        </a>
                    </li>
                </ul>
            </div>
            <!-- fim menu lateral -->


            <!-- planilha de treino - conteúdo principal -->
            <div class="col-12 col-md-9 col-lg-10 conteudo-principal">
                
                <div class="d-flex justify-content-between align-items-center">
                    <h1>Planilha de Treinos: <span id="nome_atleta"></span> </h1>
                    <button id="logoff" class="btn px-4">Sair</button>
                </div>
                
                <hr>

                <div class="mb-4">
                    <button id="novo" class="btn px-4">+ Novo Treino</button>
                </div>

                <div id="cards_treino"></div>
            </div>

        </div>
    </div>

    <script src="../js/treino/planilha_treino.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
