<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilha de Treinos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../componentes/menuLateral.css">

    <style>
        :root {
            --azul-mitra: #181952;
            --cinza-borda: #e5e5e5;
        }

        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .conteudo {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .conteudo-principal {
            flex: 1;
            min-width: 0;
            padding: 40px 50px;
        }

        h1 {
            color: var(--azul-mitra);
            font-weight: 600;
            font-size: 2rem;
            margin: 0;
        }

        hr {
            border-color: var(--azul-mitra);
            opacity: 0.2;
        }

        .btn-planilha {
            background-color: #3d5af1;
            color: white;
            border: none;
            padding: 7px 18px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-planilha:hover {
            background-color: #2a3fb5;
            box-shadow: 0 3px 10px rgba(61, 90, 241, 0.3);
        }

        #lista {
            max-width: 1100px;
            margin: 0 auto;
        }

        #lista table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        #lista th {
            background-color: var(--azul-mitra);
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-weight: 500;
        }

        #lista td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--cinza-borda);
            vertical-align: middle;
        }

        #lista tr:hover {
            background-color: #f8f9fa;
        }

        #lista a {
            color: var(--azul-mitra);
            text-decoration: none;
            font-weight: 500;
            margin-right: 15px;
        }

        #lista a:hover {
            text-decoration: underline;
        }

        #lista th:last-child,
        #lista td:last-child {
            text-align: center;
        }

        #lista td:last-child a:last-child {
            margin-right: 0;
        }
    </style>
</head>
<body>
    <div class="conteudo">
        <div id="menu-lateral"></div>

        <div class="conteudo-principal">
            <div class="d-flex justify-content-between align-items-center">
                <h1>Seus atletas - Visualizar Planilhas de treino individuais</h1>
            </div>

            <hr>

            <div id="lista"></div>
        </div>
    </div>

    <script src="../js/menu_lateral.js" defer></script>
    <script src="../js/treino/atletas_treino.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
