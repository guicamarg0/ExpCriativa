<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar treino</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../componentes/menuLateral.css">
    <link rel="stylesheet" href="treino_alterar.css">
</head>
<body>
    <div class="conteudo">
        <div id="menu-lateral"></div>

        <div class="conteudo-principal">
            <div>
                <h1>Alteracao de Treino</h1>
            </div>
            <hr class="mb-4">

            <form id="formTreinoEdicao" class="form-container" novalidate>
                <input type="hidden" name="id">
                <input type="hidden" name="id_atleta">
                <input type="hidden" name="id_treinador">

                <div class="mb-3">
                    <label for="modalidade" class="form-label fw-semibold text-secondary">Modalidade do treino: </label>
                    <select id="modalidade" name="modalidade_id" class="form-control" required>
                        <option value="">Selecione uma modalidade</option>
                    </select>
                </div>

                <div class="mb-3 oculto" id="lista_exercicios_container">
                    <label class="form-label fw-semibold text-secondary">Exercicios vinculados</label>
                    <div id="lista_exercicios"></div>
                </div>

                <div class="mb-3">
                    <label for="data" class="form-label fw-semibold text-secondary">Data do treino: </label>
                    <input type="date" id="data" name="data" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="detalhes" class="form-label fw-semibold text-secondary">Detalhes e informacoes do Treino:</label>
                    <textarea id="detalhes" name="detalhes" class="form-control" rows="5" placeholder="Descreva o objetivo, volume e orientacoes do treino" required></textarea>
                </div>

                <div class="mb-3">
                    <label for="atleta" class="form-label fw-semibold text-secondary">O treino sera vinculado ao Atleta: </label>
                    <input type="text" id="atleta" name="atleta" class="form-control" placeholder="Atleta selecionado" readonly>
                </div>

                <div>
                    <button type="submit" id="enviar" class="btn px-4">Salvar alteracoes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/menu_lateral.js" defer></script>
    <script src="../js/notificacao.js"></script>
    <script src="../js/treino/treino_alterar.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
