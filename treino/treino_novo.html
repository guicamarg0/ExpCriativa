<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo treino</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../componentes/menuLateral.css">

    <style>
        :root {
            --azul-mitra: #181952;
            --cinza-borda: #e5e5e5;
        }

        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .conteudo {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .conteudo-principal {
            flex: 1;
            min-width: 0;
            padding: 40px 50px;
        }

        h1 {
            color: var(--azul-mitra);
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 0;
        }

        hr {
            border-color: var(--azul-mitra);
            opacity: 0.2;
        }

        #enviar {
            background-color: var(--azul-mitra);
            color: white;
            border: 1px solid var(--azul-mitra);
        }

        #enviar:hover {
            background-color: #22246b;
            color: white;
        }

        .form-container {
            max-width: 500px;
        }

        .bloco-metricas {
            border: 1px solid var(--cinza-borda);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .bloco-metricas h2 {
            color: var(--azul-mitra);
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .lista-metricas {
            display: grid;
            gap: 8px;
            margin-bottom: 12px;
        }

        .lista-metricas label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .campos-metrica {
            display: grid;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="conteudo">
        <div id="menu-lateral"></div>

        <div class="conteudo-principal">
            <div>
                <h1>Novo Treino</h1>
            </div>
            <hr class="mb-4">

            <form id="formTreinoNovo" class="form-container">
                <input type="hidden" name="id_atleta">
                <input type="hidden" name="id_treinador">

                <div class="mb-3">
                    <label for="modalidade" class="form-label fw-semibold text-secondary">Modalidade do treino: </label>
                    <input type="text" id="modalidade" name="modalidade" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="data" class="form-label fw-semibold text-secondary">Data do treino: </label>
                    <input type="date" id="data" name="data" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="detalhes" class="form-label fw-semibold text-secondary">Detalhes e informacoes do Treino:</label>
                    <textarea id="detalhes" name="detalhes" class="form-control" rows="5" required></textarea>
                </div>

                <div class="mb-3">
                    <label for="atleta" class="form-label fw-semibold text-secondary">O treino sera vinculado ao Atleta: </label>
                    <input type="text" id="atleta" name="atleta" class="form-control" readonly>
                </div>

                <div class="bloco-metricas">
                    <h2>Metricas para o atleta preencher</h2>
                    <p>Percepcao de esforco sempre sera adicionada.</p>
                    <div id="lista_metricas" class="lista-metricas"></div>

                    <div class="campos-metrica">
                        <input type="text" id="nova_metrica_nome" class="form-control" placeholder="Nova metrica">
                        <input type="text" id="nova_metrica_unidade" class="form-control" placeholder="Unidade">
                        <select id="nova_metrica_tipo" class="form-control">
                            <option value="numero">Numero</option>
                            <option value="escala_0_10">Escala 0 a 10</option>
                            <option value="aproveitamento">Aproveitamento</option>
                        </select>
                        <textarea id="nova_metrica_descricao" class="form-control" rows="2" placeholder="Descricao"></textarea>
                        <button type="button" id="btnCadastrarMetrica" class="btn px-4">Cadastrar metrica</button>
                    </div>
                </div>

                <div>
                    <button type="submit" id="enviar" class="btn px-4">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/menu_lateral.js" defer></script>
    <script src="../js/treino/treino_novo.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
